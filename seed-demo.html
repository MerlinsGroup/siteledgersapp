<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteLedgers — Seed BordoDesign Demo Data</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    h2 { font-size: 1rem; color: #6B7280; margin-bottom: 20px; font-weight: 400; }
    .step { padding: 10px 0; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    .step--done { color: #16A34A; }
    .step--active { color: #3B82F6; font-weight: 600; }
    .step--error { color: #EF4444; }
    button { padding: 12px 28px; background: #121826; color: #B7F34D; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .warning { background: #fef9c3; color: #854d0e; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    .result { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 14px; }
    .result--success { background: #d1fae5; color: #065f46; }
    .result--error { background: #fef2f2; color: #991b1b; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    #steps { margin-top: 16px; }
    .creds { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 16px; border-radius: 8px; margin-top: 12px; }
    .creds strong { display: block; margin-bottom: 8px; }
    .creds code { background: #dcfce7; }
  </style>
</head>
<body>
  <h1>SiteLedgers — Seed BordoDesign Demo</h1>
  <h2>Create a demo account with realistic data</h2>

  <p class="warning">
    This creates a <strong>BordoDesign</strong> demo account with 5 properties, 12 issues, 7 inspections,
    6 team members, and activity logs. Enter any email + password to create the account.
  </p>

  <div>
    <label style="display:block; font-size:14px; font-weight:500; margin-bottom:4px;">Email</label>
    <input type="email" id="email" style="width:100%; padding:8px 12px; font-size:16px; border:1px solid #d1d5db; border-radius:6px; box-sizing:border-box; margin-bottom:12px;" placeholder="demo@bordodesign.co" value="demo@bordodesign.co">
    <label style="display:block; font-size:14px; font-weight:500; margin-bottom:4px;">Password</label>
    <input type="password" id="password" style="width:100%; padding:8px 12px; font-size:16px; border:1px solid #d1d5db; border-radius:6px; box-sizing:border-box;" placeholder="Min 6 characters" value="demo1234">
  </div>

  <button id="seed-btn" onclick="runSeed()">Seed BordoDesign Data</button>

  <div id="steps"></div>
  <div id="result"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, collection, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js';
    import firebaseConfig from './js/firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const stepsEl = document.getElementById('steps');
    const resultEl = document.getElementById('result');

    function addStep(text, status = 'active') {
      const div = document.createElement('div');
      div.className = `step step--${status}`;
      div.textContent = (status === 'done' ? '\u2713 ' : status === 'error' ? '\u2717 ' : '\u2192 ') + text;
      stepsEl.appendChild(div);
      return div;
    }

    function markStep(div, status) {
      div.className = `step step--${status}`;
      const text = div.textContent.substring(2);
      div.textContent = (status === 'done' ? '\u2713 ' : status === 'error' ? '\u2717 ' : '\u2192 ') + text;
    }

    function daysAgo(days) {
      const d = new Date();
      d.setDate(d.getDate() - days);
      return Timestamp.fromDate(d);
    }

    function daysFromNow(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return Timestamp.fromDate(d);
    }

    window.runSeed = async function() {
      const btn = document.getElementById('seed-btn');
      btn.disabled = true;
      stepsEl.innerHTML = '';
      resultEl.innerHTML = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        resultEl.innerHTML = '<div class="result result--error">Please enter email and password.</div>';
        btn.disabled = false;
        return;
      }

      try {
        // ─── 1. SIGN IN OR CREATE ACCOUNT ──────────────────
        let step = addStep('Signing in / creating account...');
        let uid;
        try {
          const cred = await signInWithEmailAndPassword(auth, email, password);
          uid = cred.user.uid;
        } catch (e) {
          if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
            try {
              const cred = await createUserWithEmailAndPassword(auth, email, password);
              uid = cred.user.uid;
            } catch (createErr) {
              if (createErr.code === 'auth/email-already-in-use') {
                throw new Error('Account exists but password is wrong. Try a different password or use the correct one.');
              }
              throw createErr;
            }
          } else { throw e; }
        }
        markStep(step, 'done');

        const orgId = uid + '_org';

        // ─── 2. ORGANISATION ─────────────────────────────────
        step = addStep('Creating BordoDesign organisation...');
        await setDoc(doc(db, 'organisations', orgId), {
          name: 'BordoDesign',
          ownerId: uid,
          createdAt: daysAgo(90),
        });
        markStep(step, 'done');

        // ─── 3. OWNER USER DOC + userOrgs ────────────────────
        step = addStep('Creating owner account (Sam Mitchell)...');
        await setDoc(doc(db, 'organisations', orgId, 'users', uid), {
          id: uid,
          email: email,
          name: 'Sam Mitchell',
          phone: '+44 7700 900123',
          role: 'owner',
          company: 'BordoDesign',
          avatarUrl: null,
          assignedProperties: [],
          hasAppAccess: true,
          status: 'active',
          notificationPrefs: { emailOnAssignment: true, emailOnOverdue: true, emailOnStatusChange: true },
          createdAt: daysAgo(90),
          createdBy: uid,
          lastLoginAt: serverTimestamp(),
        });

        await setDoc(doc(db, 'userOrgs', uid), { orgId, role: 'owner' });
        markStep(step, 'done');

        // ─── 4. TEAM MEMBERS ─────────────────────────────────
        step = addStep('Creating 5 team members...');
        const teamMembers = [
          { name: 'James Clarke', email: 'james@bordodesign.co', role: 'property_manager', company: 'BordoDesign' },
          { name: 'Sarah Nguyen', email: 'sarah@bordodesign.co', role: 'property_manager', company: 'BordoDesign' },
          { name: 'Tom Hartley', email: 'tom@quickfixmaintenance.co.uk', role: 'contractor', company: 'QuickFix Maintenance' },
          { name: 'Alex Petrov', email: 'alex@safedoor.co.uk', role: 'contractor', company: 'SafeDoor Ltd' },
          { name: 'Rachel Kim', email: 'rachel@bordodesign.co', role: 'inspector', company: 'BordoDesign' },
        ];

        const memberIds = {};
        for (const m of teamMembers) {
          const ref = doc(collection(db, 'organisations', orgId, 'users'));
          memberIds[m.name] = ref.id;
          await setDoc(ref, {
            id: ref.id,
            email: m.email,
            name: m.name,
            phone: '',
            role: m.role,
            company: m.company,
            avatarUrl: null,
            assignedProperties: [],
            hasAppAccess: true,
            status: 'active',
            notificationPrefs: { emailOnAssignment: true, emailOnOverdue: true, emailOnStatusChange: true },
            createdAt: daysAgo(60),
            createdBy: uid,
            updatedAt: daysAgo(60),
          });
        }
        markStep(step, 'done');

        // ─── 5. PROPERTIES ───────────────────────────────────
        // NOTE: status:'active' and openIssueCount are required by fetchAccessibleProperties()
        step = addStep('Creating 5 properties...');
        const propertiesDef = [
          { name: 'Riverside Court', address: '14 Thames Walk, London SE1 2AB', type: 'residential', units: 24, openIssues: 5, description: 'Modern riverside apartments. 3 blocks (A, B, C) with shared courtyard and underground parking.' },
          { name: 'Oakfield House', address: '8 Park Lane, Oxford OX1 3HG', type: 'residential', units: 12, openIssues: 2, description: 'Victorian conversion into 12 self-contained flats. Grade II listed building.' },
          { name: 'St James Medical Centre', address: '45 High Street, Bristol BS1 4QR', type: 'commercial', units: 8, openIssues: 1, description: 'Multi-tenant medical centre. Ground floor pharmacy, upper floors consulting rooms.' },
          { name: 'Millbrook Academy', address: '22 School Road, Leeds LS1 5NP', type: 'commercial', units: 16, openIssues: 1, description: 'Purpose-built academy campus. Main block, sports hall, and science annex.' },
          { name: 'The Granary', address: '3 Wharf Street, Manchester M1 6FT', type: 'mixed', units: 18, openIssues: 1, description: 'Converted warehouse. Ground floor retail, upper floors residential loft apartments.' },
        ];

        const propertyIds = {};
        for (const p of propertiesDef) {
          const ref = doc(collection(db, 'organisations', orgId, 'properties'));
          propertyIds[p.name] = ref.id;
          await setDoc(ref, {
            name: p.name,
            address: p.address,
            type: p.type,
            units: p.units,
            description: p.description,
            status: 'active',
            imageUrl: null,
            openIssueCount: p.openIssues,
            overdueIssueCount: 0,
            lastInspectionDate: null,
            createdAt: daysAgo(80),
            updatedAt: daysAgo(80),
            createdBy: uid,
          });
        }
        markStep(step, 'done');

        // ─── 6. ISSUES ───────────────────────────────────────
        // Statuses match app: open, acknowledged, assigned, in_progress, resolved, verified, closed
        step = addStep('Creating 12 issues...');
        const issues = [
          { title: 'Broken window, Unit 4B', property: 'Riverside Court', status: 'open', priority: 'high', category: 'structural', reportedBy: 'James Clarke', assignee: null, description: 'Large crack in double-glazed window, ground floor facing car park. Draught coming through. Tenant reports it happened during recent storm.', location: 'Unit 4B, Ground Floor', ago: 2 },
          { title: 'Water stain on ceiling, Unit 12A', property: 'Riverside Court', status: 'acknowledged', priority: 'medium', category: 'plumbing', reportedBy: 'Sarah Nguyen', assignee: 'Tom Hartley', description: 'Brown water stain approximately 30cm diameter on bedroom ceiling. Possible leak from flat above. No active dripping observed.', location: 'Unit 12A, Bedroom', ago: 4 },
          { title: 'Fire door not closing, Block C', property: 'Riverside Court', status: 'in_progress', priority: 'high', category: 'safety', reportedBy: 'James Clarke', assignee: 'Alex Petrov', description: 'Fire door on 3rd floor corridor not closing fully. Closer mechanism appears faulty. Identified during routine walkthrough.', location: 'Block C, 3rd Floor Corridor', ago: 7 },
          { title: 'Graffiti on exterior wall', property: 'Riverside Court', status: 'resolved', priority: 'low', category: 'cosmetic', reportedBy: 'Rachel Kim', assignee: 'Tom Hartley', description: 'Spray paint graffiti on north-facing wall near bin store. Approximately 2m x 1m.', location: 'North Wall, Bin Store', ago: 14, resolvedAgo: 8 },
          { title: 'Lift out of service', property: 'Riverside Court', status: 'verified', priority: 'high', category: 'maintenance', reportedBy: 'Sarah Nguyen', assignee: 'Tom Hartley', description: 'Main passenger lift stuck on floor 2. Out of service sign posted. Engineer attended and replaced motor.', location: 'Main Lift Shaft', ago: 21, resolvedAgo: 15 },
          { title: 'Damp patches in hallway', property: 'Oakfield House', status: 'open', priority: 'medium', category: 'plumbing', reportedBy: 'James Clarke', assignee: null, description: 'Visible damp patches on ground floor hallway wall, near front entrance. Musty smell. Likely rising damp.', location: 'Ground Floor Hallway', ago: 1 },
          { title: 'Broken fence panel, rear garden', property: 'Oakfield House', status: 'acknowledged', priority: 'low', category: 'maintenance', reportedBy: 'Rachel Kim', assignee: 'Tom Hartley', description: 'Timber fence panel blown down in rear garden area. Gap approximately 1.8m. Security concern.', location: 'Rear Garden', ago: 5 },
          { title: 'Emergency light fault, Floor 2', property: 'St James Medical Centre', status: 'in_progress', priority: 'high', category: 'electrical', reportedBy: 'James Clarke', assignee: 'Alex Petrov', description: 'Emergency exit light on floor 2 not illuminating during monthly test. Replacement unit ordered.', location: 'Floor 2, Exit Corridor', ago: 3 },
          { title: 'Cracked paving, main entrance', property: 'Millbrook Academy', status: 'open', priority: 'medium', category: 'structural', reportedBy: 'Sarah Nguyen', assignee: null, description: 'Several cracked paving slabs at main entrance. Trip hazard, especially during wet weather.', location: 'Main Entrance', ago: 2 },
          { title: 'Heating failure, Suite 3', property: 'The Granary', status: 'in_progress', priority: 'high', category: 'maintenance', reportedBy: 'Rachel Kim', assignee: 'Tom Hartley', description: 'Central heating not functioning in Suite 3, second floor. Radiators cold. Boiler pressure reading zero.', location: 'Suite 3, 2nd Floor', ago: 1 },
          { title: 'Intercom system fault', property: 'The Granary', status: 'closed', priority: 'medium', category: 'electrical', reportedBy: 'James Clarke', assignee: 'Alex Petrov', description: 'Door entry intercom for units 10-18 not connecting. Replaced main board. Now functioning.', location: 'Main Entrance Panel', ago: 10, resolvedAgo: 5 },
          { title: 'Roof tile damage, Block A', property: 'Riverside Court', status: 'acknowledged', priority: 'high', category: 'structural', reportedBy: 'Sarah Nguyen', assignee: 'Tom Hartley', description: 'Several roof tiles displaced after storm. Visible from ground level. Risk of water ingress.', location: 'Block A, Roof', ago: 3 },
        ];

        for (const issue of issues) {
          const ref = doc(collection(db, 'organisations', orgId, 'issues'));

          await setDoc(ref, {
            title: issue.title,
            propertyId: propertyIds[issue.property],
            propertyName: issue.property,
            status: issue.status,
            priority: issue.priority,
            category: issue.category,
            description: issue.description,
            location: issue.location,
            reportedBy: memberIds[issue.reportedBy] || uid,
            reportedByName: issue.reportedBy,
            assignedTo: issue.assignee ? (memberIds[issue.assignee] || null) : null,
            assignedToName: issue.assignee || null,
            dueDate: daysFromNow(14),
            resolvedAt: issue.resolvedAgo ? daysAgo(issue.resolvedAgo) : null,
            createdAt: daysAgo(issue.ago),
            updatedAt: daysAgo(Math.max(0, issue.ago - 1)),
            createdBy: memberIds[issue.reportedBy] || uid,
          });

          // Add issue updates (activity within the issue)
          await setDoc(doc(collection(db, 'organisations', orgId, 'issues', ref.id, 'updates')), {
            type: 'comment',
            text: 'Issue reported and logged in the system.',
            authorId: memberIds[issue.reportedBy] || uid,
            authorName: issue.reportedBy,
            createdAt: daysAgo(issue.ago),
          });

          if (issue.assignee) {
            await setDoc(doc(collection(db, 'organisations', orgId, 'issues', ref.id, 'updates')), {
              type: 'assignment',
              text: `Assigned to ${issue.assignee}`,
              authorId: uid,
              authorName: 'Sam Mitchell',
              createdAt: daysAgo(Math.max(0, issue.ago - 1)),
            });
          }

          if (issue.status === 'in_progress' && issue.assignee) {
            await setDoc(doc(collection(db, 'organisations', orgId, 'issues', ref.id, 'updates')), {
              type: 'comment',
              text: 'On site now, assessing the situation. Will update once I have more info.',
              authorId: memberIds[issue.assignee] || uid,
              authorName: issue.assignee,
              createdAt: daysAgo(Math.max(0, issue.ago - 2)),
            });
          }
        }
        markStep(step, 'done');

        // ─── 7. INSPECTIONS ──────────────────────────────────
        // Uses scheduledDate (not dueDate), checklist array, assignedToName
        step = addStep('Creating 7 inspections...');

        const securityChecklist = [
          'All windows secured and intact',
          'No signs of water ingress or damp',
          'Heating system off / drained',
          'No signs of unauthorised entry',
          'Smoke alarms tested and working',
          'Photo evidence captured',
        ];

        const fireSafetyChecklist = [
          'All fire doors closing correctly',
          'Fire extinguishers in date and accessible',
          'Emergency lighting functioning',
          'Fire alarm panel no faults',
          'Escape routes clear and unobstructed',
          'Fire assembly point signage visible',
          'Smoke detectors tested',
          'Fire risk assessment displayed',
        ];

        const hsChecklist = [
          'Trip hazards assessed',
          'Handrails secure',
          'Lighting adequate in all areas',
          'Fire exits clearly marked',
          'First aid kit stocked',
          'Cleaning products stored safely',
          'Electrical panel access clear',
          'Emergency contacts displayed',
          'Wet floor signs available',
          'COSHH assessments current',
          'PAT testing labels in date',
          'Legionella risk assessment current',
        ];

        const generalChecklist = [
          'External walls condition',
          'Roof and guttering',
          'Windows and frames',
          'Car park / grounds',
          'Common area cleanliness',
          'Bin store condition',
          'Signage and wayfinding',
          'Security systems operational',
          'Landscaping maintained',
          'Boundary fences intact',
        ];

        const inspections = [
          { title: 'Empty Unit Check — 4B', property: 'Riverside Court', status: 'scheduled', daysUntil: 0, checklist: securityChecklist, assignee: 'Rachel Kim', notes: 'Unit 4B recently vacated. Check for any damage before new tenant moves in.' },
          { title: 'Fire Safety — Block A', property: 'Riverside Court', status: 'scheduled', daysUntil: 1, checklist: fireSafetyChecklist, assignee: 'Rachel Kim', notes: 'Annual fire safety inspection. Check all communal areas.' },
          { title: 'Empty Unit Check — 7', property: 'Oakfield House', status: 'scheduled', daysUntil: 3, checklist: securityChecklist, assignee: 'James Clarke', notes: '' },
          { title: 'Empty Unit Check — 9C', property: 'Riverside Court', status: 'completed', daysUntil: -5, checklist: securityChecklist, assignee: 'Rachel Kim', notes: 'All items passed. Unit ready for new tenant.', completed: true },
          { title: 'H&S Walkthrough', property: 'St James Medical Centre', status: 'completed', daysUntil: -8, checklist: hsChecklist, assignee: 'James Clarke', notes: 'Two minor items flagged: replacement first aid supplies needed, one emergency light bulb replaced.', completed: true },
          { title: 'Quarterly External Review', property: 'Millbrook Academy', status: 'scheduled', daysUntil: 7, checklist: generalChecklist, assignee: 'Sarah Nguyen', notes: 'Q1 external condition review.' },
          { title: 'Fire Extinguisher Check', property: 'The Granary', status: 'completed', daysUntil: -12, checklist: fireSafetyChecklist, assignee: 'Rachel Kim', notes: 'All extinguishers in date. Next check due in 6 months.', completed: true },
        ];

        for (const insp of inspections) {
          const checklist = insp.checklist.map((label) => ({
            label,
            checked: insp.completed ? true : false,
          }));

          const ref = doc(collection(db, 'organisations', orgId, 'inspections'));
          await setDoc(ref, {
            title: insp.title,
            propertyId: propertyIds[insp.property],
            propertyName: insp.property,
            status: insp.status,
            scheduledDate: insp.daysUntil >= 0 ? daysFromNow(insp.daysUntil) : daysAgo(-insp.daysUntil),
            assignedTo: memberIds[insp.assignee] || uid,
            assignedToName: insp.assignee,
            notes: insp.notes,
            checklist,
            completedItems: insp.completed ? checklist.length : 0,
            totalItems: checklist.length,
            createdAt: daysAgo(30),
            updatedAt: insp.completed ? daysAgo(-insp.daysUntil) : daysAgo(30),
            createdBy: uid,
          });
        }
        markStep(step, 'done');

        // ─── 8. ACTIVITY LOG ─────────────────────────────────
        // Uses performedBy, performedByName, performedByRole, entityTitle, action
        step = addStep('Creating 15 activity log entries...');
        const activities = [
          { action: 'issue_created', entityType: 'issue', entityTitle: 'Broken window, Unit 4B', propertyName: 'Riverside Court', user: 'James Clarke', role: 'property_manager', ago: 2 },
          { action: 'issue_created', entityType: 'issue', entityTitle: 'Damp patches in hallway', propertyName: 'Oakfield House', user: 'James Clarke', role: 'property_manager', ago: 1 },
          { action: 'issue_created', entityType: 'issue', entityTitle: 'Heating failure, Suite 3', propertyName: 'The Granary', user: 'Rachel Kim', role: 'inspector', ago: 1 },
          { action: 'issue_assigned', entityType: 'issue', entityTitle: 'Water stain on ceiling, Unit 12A', propertyName: 'Riverside Court', user: 'Sam Mitchell', role: 'owner', ago: 3 },
          { action: 'issue_assigned', entityType: 'issue', entityTitle: 'Fire door not closing, Block C', propertyName: 'Riverside Court', user: 'Sam Mitchell', role: 'owner', ago: 6 },
          { action: 'issue_status_changed', entityType: 'issue', entityTitle: 'Graffiti on exterior wall', propertyName: 'Riverside Court', user: 'Tom Hartley', role: 'contractor', ago: 8 },
          { action: 'issue_status_changed', entityType: 'issue', entityTitle: 'Lift out of service', propertyName: 'Riverside Court', user: 'Sam Mitchell', role: 'owner', ago: 15 },
          { action: 'inspection_completed', entityType: 'inspection', entityTitle: 'Empty Unit Check — 9C', propertyName: 'Riverside Court', user: 'Rachel Kim', role: 'inspector', ago: 5 },
          { action: 'inspection_completed', entityType: 'inspection', entityTitle: 'H&S Walkthrough', propertyName: 'St James Medical Centre', user: 'James Clarke', role: 'property_manager', ago: 8 },
          { action: 'user_invited', entityType: 'user', entityTitle: 'Tom Hartley', propertyName: null, user: 'Sam Mitchell', role: 'owner', ago: 60 },
          { action: 'property_created', entityType: 'property', entityTitle: 'Riverside Court', propertyName: 'Riverside Court', user: 'Sam Mitchell', role: 'owner', ago: 80 },
          { action: 'property_created', entityType: 'property', entityTitle: 'Oakfield House', propertyName: 'Oakfield House', user: 'Sam Mitchell', role: 'owner', ago: 78 },
          { action: 'issue_created', entityType: 'issue', entityTitle: 'Roof tile damage, Block A', propertyName: 'Riverside Court', user: 'Sarah Nguyen', role: 'property_manager', ago: 3 },
          { action: 'issue_assigned', entityType: 'issue', entityTitle: 'Heating failure, Suite 3', propertyName: 'The Granary', user: 'Sam Mitchell', role: 'owner', ago: 0 },
          { action: 'inspection_created', entityType: 'inspection', entityTitle: 'Fire Safety — Block A', propertyName: 'Riverside Court', user: 'Sam Mitchell', role: 'owner', ago: 2 },
        ];

        for (const a of activities) {
          await setDoc(doc(collection(db, 'organisations', orgId, 'activityLog')), {
            action: a.action,
            entityType: a.entityType,
            entityTitle: a.entityTitle,
            propertyName: a.propertyName,
            performedBy: a.user === 'Sam Mitchell' ? uid : (memberIds[a.user] || uid),
            performedByName: a.user,
            performedByRole: a.role,
            createdAt: daysAgo(a.ago),
          });
        }
        markStep(step, 'done');

        // ─── DONE ────────────────────────────────────────────
        resultEl.innerHTML = `
          <div class="result result--success">
            <strong>BordoDesign demo data seeded successfully!</strong><br><br>
            <div class="creds">
              <strong>Login credentials:</strong>
              Email: <code>${email}</code><br>
              Password: <code>${password}</code>
            </div>
            <br>
            Organisation: <strong>BordoDesign</strong><br>
            Owner: <strong>Sam Mitchell</strong><br>
            Team members: <strong>${teamMembers.length}</strong><br>
            Properties: <strong>${propertiesDef.length}</strong><br>
            Issues: <strong>${issues.length}</strong><br>
            Inspections: <strong>${inspections.length}</strong><br><br>
            <a href="index.html#/login" style="color:#065f46; font-weight:600;">→ Sign in to SiteLedgers</a>
          </div>
        `;

      } catch (err) {
        console.error(err);
        resultEl.innerHTML = `<div class="result result--error"><strong>Error:</strong> ${err.message}</div>`;
      }

      btn.disabled = false;
    };
  </script>
</body>
</html>
