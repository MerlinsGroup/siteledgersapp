<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteLedgers — Property Oversight & Accountability</title>

  <!-- Google Fonts: Plus Jakarta Sans + Space Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>

  <!-- App Shell -->
  <!-- Navbar is injected here by the router for authenticated pages -->
  <div id="navbar-container"></div>

  <!-- Loading indicator shown while Firebase initialises -->
  <div id="app-loader" class="app-loader">
    <p>Loading SiteLedgers...</p>
  </div>

  <!-- Router loads page content here -->
  <div id="app" class="app-container" style="display:none;"></div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Firebase SDK (modular, via CDN — no build step required) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
