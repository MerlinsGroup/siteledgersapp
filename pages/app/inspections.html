<div class="page">
  <div class="page-header">
    <h1>Inspections</h1>
    <button class="btn btn--primary" id="new-inspection-btn" data-permission="inspection_create">Schedule Inspection</button>
  </div>

  <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-6);flex-wrap:wrap;" id="filter-tabs">
    <button class="btn btn--sm btn--primary" data-filter="all">All</button>
    <button class="btn btn--sm btn--ghost" data-filter="scheduled">Scheduled</button>
    <button class="btn btn--sm btn--ghost" data-filter="in_progress">In Progress</button>
    <button class="btn btn--sm btn--ghost" data-filter="completed">Completed</button>
  </div>

  <div class="card">
    <div id="inspections-list"><div class="loading-spinner"><div class="spinner"></div><p>Loading...</p></div></div>
    <div id="inspections-empty" class="empty-state" style="display:none;">
      <p class="empty-state__text">No inspections yet.</p>
      <button class="btn btn--primary btn--sm" id="new-inspection-empty-btn" data-permission="inspection_create">Schedule First Inspection</button>
    </div>
  </div>

  <!-- New Inspection Modal -->
  <div class="modal-overlay" id="new-inspection-modal" style="display:none;">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title">Schedule Inspection</h3>
        <button class="modal__close" id="close-inspection-modal">&times;</button>
      </div>
      <form id="new-inspection-form">
        <div class="modal__body">
          <div class="form-group">
            <label class="form-label" for="insp-property">Property *</label>
            <select class="form-input" id="insp-property" required>
              <option value="">Select property...</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="insp-title">Inspection Title *</label>
            <input class="form-input" type="text" id="insp-title" placeholder="e.g. Fire Safety Check" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="insp-date">Scheduled Date *</label>
            <input class="form-input" type="date" id="insp-date" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="insp-assignee">Inspector</label>
            <select class="form-input" id="insp-assignee">
              <option value="">Select inspector...</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="insp-notes">Notes</label>
            <textarea class="form-input" id="insp-notes" rows="3" placeholder="Additional notes..."></textarea>
          </div>
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--secondary" id="cancel-inspection-btn">Cancel</button>
          <button type="submit" class="btn btn--primary" id="save-inspection-btn">Schedule</button>
        </div>
      </form>
    </div>
  </div>
</div>
