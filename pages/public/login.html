<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">SiteLedgers</div>
    <p class="login-card__subtitle">Property Oversight & Accountability</p>

    <div id="login-error" class="login-card__error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" class="form-input" placeholder="you@company.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
        <a href="#" id="forgot-password-link" class="login-card__forgot">Forgot password?</a>
      </div>

      <button type="submit" id="login-btn" class="btn btn--primary btn--full btn--lg">Sign In</button>
    </form>

    <!-- Forgot password form (hidden by default) -->
    <form id="reset-form" style="display:none;" novalidate>
      <p class="text-sm text-muted mb-4">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label for="reset-email">Email</label>
        <input type="email" id="reset-email" name="email" class="form-input" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <button type="submit" id="reset-btn" class="btn btn--primary btn--full">Send Reset Link</button>
      <button type="button" id="back-to-login" class="btn btn--text btn--full mt-2">Back to Sign In</button>
    </form>
  </div>
</div>
