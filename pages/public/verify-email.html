<div class="login-page">
  <div class="login-card" style="text-align: center;">
    <div class="login-card__logo">Site<span>Ledgers</span></div>
    <p class="login-card__subtitle">Check your inbox</p>

    <div class="verify-email__icon">&#9993;</div>

    <p class="verify-email__text">
      We've sent a verification link to your email address.<br>
      Click the link to activate your account.
    </p>

    <button id="resend-btn" class="btn btn--primary btn--full">Resend Verification Email</button>
    <button id="check-btn" class="btn btn--secondary btn--full mt-2">I've Verified — Continue</button>

    <p class="login-card__footer"><a href="#/login">Back to Sign In</a></p>
  </div>
</div>
